server:
  port: 8080

spring:
  application:
    name: api_gateway

  cloud:
    gateway:
      routes:
        - id: order-service
          uri: http://localhost:8082
          predicates:
            - Path=/orders/**

        - id: payment-service
          uri: http://localhost:8081
          predicates:
            - Path=/payments/**

        - id: notification-service
          uri: http://localhost:8083
          predicates:
            - Path=/notifications/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway